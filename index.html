<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Фенек Вейв: Ловец Тапочек</title>
  <style>
    :root { --bg1: #0f172a; --bg2: #1e293b; --accent: #38bdf8; --danger: #f87171; --success: #34d399; --text: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
    body { overflow: hidden; background: linear-gradient(180deg, var(--bg1), var(--bg2)); font-family: system-ui, -apple-system, sans-serif; color: var(--text); touch-action: none; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #ui { position: fixed; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; z-index: 10; font-size: 1.2rem; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .stat { background: rgba(0,0,0,0.4); padding: 8px 14px; border-radius: 12px; backdrop-filter: blur(4px); }
    .lives span { margin: 0 2px; transition: all 0.2s; }
    .screen { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px); z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .screen.active { opacity: 1; pointer-events: auto; }
    .screen h1 { font-size: 2.5rem; margin-bottom: 8px; text-align: center; }
    .screen p { font-size: 1.1rem; opacity: 0.8; text-align: center; max-width: 80%; }
    .btn { padding: 14px 28px; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 14px; background: var(--accent); color: #020617; cursor: pointer; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4); transition: transform 0.1s, box-shadow 0.2s; }
    .btn:active { transform: scale(0.96); }
    .btn.restart { background: var(--success); box-shadow: 0 4px 12px rgba(52, 211, 153, 0.4); }
    @media (max-width: 600px) { #ui { font-size: 1rem; top: 10px; left: 10px; right: 10px; } .screen h1 { font-size: 2rem; } }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <div class="stat">🩴 <span id="score">0</span></div>
  <div class="stat lives" id="lives">🩴🩴🩴</div>
</div>

<div id="overlay-start" class="screen active">
  <h1>🦊 Фенек Вейв</h1>
  <p>Лови падающие тапочки! Пропустишь 3 — грусть.<br>Управляй пальцем, мышью или стрелками.</p>
  <button class="btn" onclick="startGame()">Начать игру</button>
</div>

<div id="overlay-gameover" class="screen">
  <h1 id="go-title">😢 Грусть</h1>
  <p>Вейв не догнал тапочки...<br>Счёт: <span id="final-score">0</span></p>
  <button class="btn restart" onclick="restartGame()">🔄 Играть снова</button>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const uiScore = document.getElementById('score');
  const uiLives = document.getElementById('lives');
  const startScreen = document.getElementById('overlay-start');
  const goScreen = document.getElementById('overlay-gameover');
  const finalScore = document.getElementById('final-score');
  const goTitle = document.getElementById('go-title');

  let W, H, dpr, rafId;
  let state = 'start';
  let score = 0;
  let lives = 3;
  let frame = 0;

  const fenek = { x: 0, y: 0, w: 110, h: 95, earOffset: 0, targetX: 0 };
  let slippers = [];
  let spawnRate = 90;
  let fallSpeed = 3.2;
  let inputX = null;
  let keys = {};

  function initCanvas() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
    fenek.y = H - 100;
    fenek.targetX = fenek.x = W / 2;
  }

  window.addEventListener('resize', () => {
    initCanvas();
    if (state === 'playing') updateUI();
  });

  window.addEventListener('keydown', e => keys[e.key] = true);
  window.addEventListener('keyup', e => keys[e.key] = false);

  function handlePointer(x) { inputX = x; }
  window.addEventListener('mousemove', e => handlePointer(e.clientX));
  window.addEventListener('touchmove', e => {
    e.preventDefault();
    handlePointer(e.touches[0].clientX);
  }, { passive: false });

  function updateInput() {
    if (keys['ArrowLeft'] || keys['a'] || keys['ф']) fenek.targetX -= 9;
    if (keys['ArrowRight'] || keys['d'] || keys['в']) fenek.targetX += 9;
    fenek.targetX = Math.max(fenek.w/2, Math.min(W - fenek.w/2, fenek.targetX));

    if (inputX !== null) {
      fenek.x += (fenek.targetX - fenek.x) * 0.18;
      fenek.targetX = fenek.x;
    } else {
      fenek.x = fenek.targetX;
    }
    fenek.x = Math.max(fenek.w/2, Math.min(W - fenek.w/2, fenek.x));
    // Усиленная анимация покачивания ушей
    fenek.earOffset = Math.sin(frame * 0.12) * 5 + Math.cos(frame * 0.08) * 3;
  }

  function spawnSlipper() {
    slippers.push({ x: Math.random() * (W - 40) + 20, y: -30, r: 18, speed: fallSpeed + Math.random() * 1.2 });
  }

  function checkCollision(s) {
    const dx = s.x - fenek.x;
    const dy = s.y - (fenek.y - 20); // Центр хитбокса смещён выше к мордочке
    return Math.hypot(dx, dy) < (s.r + 48); // Радиус под увеличенный размер
  }

  function drawFenek() {
    const { x, y, w, h, earOffset } = fenek;
    ctx.save();
    ctx.translate(x, y);

    // --- Большие уши ---
    ctx.fillStyle = '#f59e0b';
    // Левое
    ctx.beginPath(); ctx.ellipse(-w/2 - 8, -h/2 - 40 + earOffset, 26, 65, -0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fcd34d'; // Внутренняя часть
    ctx.beginPath(); ctx.ellipse(-w/2 - 8, -h/2 - 40 + earOffset, 16, 48, -0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f59e0b';
    // Правое
    ctx.beginPath(); ctx.ellipse(w/2 + 8, -h/2 - 40 - earOffset, 26, 65, 0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fcd34d';
    ctx.beginPath(); ctx.ellipse(w/2 + 8, -h/2 - 40 - earOffset, 16, 48, 0.15, 0, Math.PI*2); ctx.fill();

    // --- Голова ---
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath(); ctx.arc(0, -18, w/2, 0, Math.PI*2); ctx.fill();

    // Мордочка (более вытянутая)
    ctx.fillStyle = '#fef3c7';
    ctx.beginPath(); ctx.ellipse(0, -5, w/3 + 8, h/4 + 8, 0, 0, Math.PI*2); ctx.fill();

    // Глаза + блики
    ctx.fillStyle = '#0f172a';
    ctx.beginPath(); ctx.arc(-14, -18, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(14, -18, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-12, -20, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(16, -20, 2, 0, Math.PI*2); ctx.fill();

    // Нос
    ctx.fillStyle = '#0f172a';
    ctx.beginPath(); ctx.arc(0, -2, 4, 0, Math.PI*2); ctx.fill();

    // Рот
    ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 2.5;
    if (state === 'playing') {
      ctx.beginPath(); ctx.arc(0, 5, 9, 0.2, Math.PI-0.2); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(0, 11, 9, Math.PI+0.2, -0.2); ctx.stroke();
    }
    ctx.restore();
  }

  function drawSlipper(s) {
    ctx.font = `${s.r * 2}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🩴', s.x, s.y);
  }

  function update() {
    if (state !== 'playing') return;
    frame++;
    updateInput();

    if (frame % Math.floor(spawnRate) === 0) spawnSlipper();

    for (let i = slippers.length - 1; i >= 0; i--) {
      const s = slippers[i];
      s.y += s.speed;

      if (checkCollision(s)) {
        score++; updateUI(); slippers.splice(i, 1);
        if (score % 5 === 0) { fallSpeed += 0.25; spawnRate = Math.max(45, spawnRate - 4); }
      } else if (s.y > H + 30) {
        lives--; updateUI(); slippers.splice(i, 1);
        if (lives <= 0) gameOver();
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(56, 189, 248, 0.08)'; ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    slippers.forEach(drawSlipper);
    drawFenek();
  }

  function loop() { update(); draw(); if (state === 'playing') rafId = requestAnimationFrame(loop); }
  function updateUI() { uiScore.textContent = score; uiLives.innerHTML = '🩴'.repeat(Math.max(0, lives)) + '💔'.repeat(Math.max(0, 3 - lives)); }
  function startGame() { startScreen.classList.remove('active'); resetState(); state = 'playing'; loop(); }
  function gameOver() { state = 'gameover'; cancelAnimationFrame(rafId); finalScore.textContent = score; goScreen.classList.add('active'); }
  function restartGame() { goScreen.classList.remove('active'); resetState(); state = 'playing'; loop(); }
  function resetState() { score = 0; lives = 3; fallSpeed = 3.2; spawnRate = 90; slippers = []; frame = 0; fenek.x = fenek.targetX = W / 2; updateUI(); }

  initCanvas(); updateUI();
</script>
</body>
</html>
