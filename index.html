<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦊 Фенёк Вейв — Охота за Туфельками</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #gameWrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 500px;
    max-height: 800px;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(255, 120, 50, 0.3);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    z-index: 10;
    pointer-events: none;
  }

  #hud > div { pointer-events: auto; }

  .hud-box {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 8px 14px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hud-box .emoji { font-size: 20px; }
  .hud-box .value { font-size: 18px; color: #ffcc00; }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    background: rgba(10, 5, 30, 0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: opacity 0.3s;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay h1 {
    font-size: 32px;
    color: #ff8833;
    margin-bottom: 8px;
    text-align: center;
    text-shadow: 0 0 20px rgba(255,136,51,0.5);
  }

  .overlay h2 {
    font-size: 22px;
    color: #ffcc00;
    margin-bottom: 6px;
  }

  .overlay p {
    color: rgba(255,255,255,0.7);
    font-size: 15px;
    margin-bottom: 24px;
    text-align: center;
    line-height: 1.5;
    padding: 0 20px;
  }

  .fox-big { font-size: 80px; margin-bottom: 10px; }

  .btn {
    border: none;
    border-radius: 16px;
    padding: 14px 36px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin: 6px;
  }

  .btn:active { transform: scale(0.95); }

  .btn-play {
    background: linear-gradient(135deg, #ff8833, #ff5500);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,85,0,0.4);
  }

  .btn-restart {
    background: linear-gradient(135deg, #44ccff, #2299dd);
    color: #fff;
    box-shadow: 0 4px 20px rgba(34,153,221,0.4);
  }

  .btn-share {
    background: linear-gradient(135deg, #8855ff, #6633dd);
    color: #fff;
    box-shadow: 0 4px 20px rgba(102,51,221,0.4);
    font-size: 15px;
    padding: 12px 28px;
  }

  .score-display {
    font-size: 52px;
    font-weight: 800;
    color: #ffcc00;
    text-shadow: 0 0 30px rgba(255,204,0,0.5);
    margin: 10px 0;
  }

  .final-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  .stat-box {
    text-align: center;
    color: #fff;
  }

  .stat-box .label { font-size: 12px; opacity: 0.6; }
  .stat-box .num { font-size: 28px; font-weight: 700; }

  /* Toast */
  #toast {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 30;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Hearts / misses */
  .hearts { display: flex; gap: 4px; }
  .heart { font-size: 18px; transition: all 0.2s; }
  .heart.lost { filter: grayscale(1); opacity: 0.3; transform: scale(0.8); }

  /* Combo indicator */
  #combo {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff5500;
    font-size: 22px;
    font-weight: 800;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 15px rgba(255,85,0,0.6);
    pointer-events: none;
  }

  #combo.show { opacity: 1; }

  /* Mobile adjustments */
  @media (max-width: 500px) {
    #gameWrapper {
      max-width: 100vw;
      max-height: 100vh;
      border-radius: 0;
      box-shadow: none;
    }
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-box">
      <span class="emoji">👟</span>
      <span class="value" id="scoreDisplay">0</span>
    </div>
    <div class="hud-box" id="comboBox" style="opacity:0">
      <span>🔥</span>
      <span id="comboText">x2</span>
    </div>
    <div class="hud-box">
      <div class="hearts" id="heartsContainer"></div>
    </div>
  </div>

  <div id="combo"></div>

  <!-- Start Screen -->
  <div class="overlay" id="startScreen">
    <div class="fox-big">🦊</div>
    <h1>Фенёк Вейв</h1>
    <h2>👟 Охота за туфельками</h2>
    <p>Лови падающие туфельки!<br>Не дай им упасть — Фенёк расстроится 😢</p>
    <button class="btn btn-play" id="btnPlay">▶ Играть</button>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <div class="fox-big" id="goEmoji">😢</div>
    <h1 id="goTitle">Игра окончена!</h1>
    <div class="score-display" id="finalScore">0</div>
    <div class="final-stats">
      <div class="stat-box">
        <div class="num" id="statCaught">0</div>
        <div class="label">Поймано</div>
      </div>
      <div class="stat-box">
        <div class="num" id="statMissed">0</div>
        <div class="label">Пропущено</div>
      </div>
      <div class="stat-box">
        <div class="num" id="statMaxCombo">0</div>
        <div class="label">Макс. комбо</div>
      </div>
    </div>
    <button class="btn btn-restart" id="btnRestart">🔄 Играть снова</button>
    <button class="btn btn-share" id="btnShare">📤 Поделиться</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>
</div>

<script>
// ============ GAME ENGINE ============
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('gameWrapper');

// UI elements
const hud = document.getElementById('hud');
const scoreDisplay = document.getElementById('scoreDisplay');
const heartsContainer = document.getElementById('heartsContainer');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const btnPlay = document.getElementById('btnPlay');
const btnRestart = document.getElementById('btnRestart');
const btnShare = document.getElementById('btnShare');
const toast = document.getElementById('toast');
const comboEl = document.getElementById('combo');
const comboBox = document.getElementById('comboBox');
const comboText = document.getElementById('comboText');

// Game state
let W, H;
let gameRunning = false;
let score = 0;
let combo = 0;
let maxCombo = 0;
let caught = 0;
let missed = 0;
const MAX_MISSES = 5;
let slippers = [];
let particles = [];
let floatingTexts = [];
let stars = [];
let lastSpawn = 0;
let spawnInterval = 1400;
let difficulty = 1;
let foxX = 0;
let foxY = 0;
let foxWidth = 60;
let foxHeight = 50;
let foxTargetX = 0;
let foxHappy = 0; // timer for happy expression
let foxSad = 0;
let animFrame = 0;
let gameTime = 0;

// Slipper types
const SLIPPER_TYPES = [
  { emoji: '👟', points: 1, speed: 1 },
  { emoji: '👠', points: 2, speed: 1.3 },
  { emoji: '👢', points: 3, speed: 0.9 },
  { emoji: '👡', points: 2, speed: 1.5 },
  { emoji: '🥿', points: 1, speed: 1.1 },
];

// Golden slipper (bonus)
const GOLDEN = { emoji: '✨👟✨', points: 5, speed: 0.7, golden: true };

function resize() {
  const rect = wrapper.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  foxY = H - 80;
  if (!gameRunning) {
    foxX = W / 2;
    foxTargetX = foxX;
  }
  initStars();
}

function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.005 + 0.002
    });
  }
}

function updateHearts() {
  heartsContainer.innerHTML = '';
  for (let i = 0; i < MAX_MISSES; i++) {
    const span = document.createElement('span');
    span.className = 'heart' + (i >= (MAX_MISSES - missed) ? ' lost' : '');
    span.textContent = '💖';
    heartsContainer.appendChild(span);
  }
}

function showToast(msg, duration = 2000) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

// ============ DRAWING ============
function drawStars() {
  stars.forEach(s => {
    s.a += s.speed;
    const alpha = 0.3 + Math.sin(s.a) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawFox(x, y) {
  const size = foxWidth;
  ctx.save();
  ctx.translate(x, y);

  // Happy bounce
  let bounce = 0;
  if (foxHappy > 0) {
    bounce = Math.sin(foxHappy * 0.3) * 5;
  }
  ctx.translate(0, bounce);

  // Body
  ctx.fillStyle = '#f4a020';
  ctx.beginPath();
  ctx.ellipse(0, 5, size * 0.35, size * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#f4a020';
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.25, size * 0.3, size * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#e89010';
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, -size * 0.45);
  ctx.lineTo(-size * 0.35, -size * 0.7);
  ctx.lineTo(-size * 0.05, -size * 0.5);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(size * 0.2, -size * 0.45);
  ctx.lineTo(size * 0.35, -size * 0.7);
  ctx.lineTo(size * 0.05, -size * 0.5);
  ctx.fill();

  // Inner ears
  ctx.fillStyle = '#ffb8b8';
  ctx.beginPath();
  ctx.moveTo(-size * 0.18, -size * 0.48);
  ctx.lineTo(-size * 0.3, -size * 0.65);
  ctx.lineTo(-size * 0.08, -size * 0.52);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(size * 0.18, -size * 0.48);
  ctx.lineTo(size * 0.3, -size * 0.65);
  ctx.lineTo(size * 0.08, -size * 0.52);
  ctx.fill();

  // Face white area
  ctx.fillStyle = '#fff5e6';
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.18, size * 0.2, size * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  const eyeY = -size * 0.28;
  if (foxSad > 0) {
    // Sad eyes (closed)
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-size * 0.12, eyeY, 4, Math.PI, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(size * 0.12, eyeY, 4, Math.PI, 0);
    ctx.stroke();

    // Tears
    ctx.fillStyle = '#66ccff';
    ctx.beginPath();
    ctx.ellipse(-size * 0.18, eyeY + 8, 3, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(size * 0.18, eyeY + 8, 3, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (foxHappy > 0) {
    // Happy eyes
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-size * 0.12, eyeY, 5, Math.PI, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(size * 0.12, eyeY, 5, Math.PI, 0);
    ctx.stroke();
  } else {
    // Normal eyes
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.ellipse(-size * 0.12, eyeY, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(size * 0.12, eyeY, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-size * 0.1, eyeY - 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.14, eyeY - 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Nose
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.15, 3, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  if (foxHappy > 0) {
    ctx.arc(0, -size * 0.1, 6, 0, Math.PI);
  } else if (foxSad > 0) {
    ctx.arc(0, -size * 0.02, 6, Math.PI, 0);
  } else {
    ctx.moveTo(-4, -size * 0.1);
    ctx.lineTo(0, -size * 0.08);
    ctx.lineTo(4, -size * 0.1);
  }
  ctx.stroke();

  // Tail
  const tailWag = Math.sin(animFrame * 0.08) * 8;
  ctx.fillStyle = '#f4a020';
  ctx.beginPath();
  ctx.moveTo(size * 0.25, 5);
  ctx.quadraticCurveTo(size * 0.5 + tailWag, -5, size * 0.45 + tailWag, -20);
  ctx.quadraticCurveTo(size * 0.35 + tailWag, -10, size * 0.25, 5);
  ctx.fill();

  // Tail tip (white)
  ctx.fillStyle = '#fff5e6';
  ctx.beginPath();
  ctx.ellipse(size * 0.45 + tailWag, -20, 6, 5, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Paws
  ctx.fillStyle = '#e89010';
  ctx.beginPath();
  ctx.ellipse(-size * 0.2, size * 0.25, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(size * 0.2, size * 0.25, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawSlipper(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.rotation);

  if (s.golden) {
    // Glow effect
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 20;
  }

  ctx.font = `${s.size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(s.type.emoji, 0, 0);

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.font = `bold ${ft.size}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = ft.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  });
}

function drawGround() {
  const gradient = ctx.createLinearGradient(0, H - 40, 0, H);
  gradient.addColorStop(0, 'rgba(244,160,32,0.1)');
  gradient.addColorStop(1, 'rgba(244,160,32,0.05)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, H - 40, W, 40);

  // Ground line
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H - 40);
  ctx.lineTo(W, H - 40);
  ctx.stroke();
}

// ============ GAME LOGIC ============
function spawnSlipper() {
  const isGolden = Math.random() < 0.08;
  const type = isGolden ? GOLDEN : SLIPPER_TYPES[Math.floor(Math.random() * SLIPPER_TYPES.length)];
  const size = 36 + Math.random() * 12;

  slippers.push({
    x: 30 + Math.random() * (W - 60),
    y: -40,
    size: size,
    type: type,
    speed: (1.5 + Math.random() * 1.5) * type.speed * (1 + difficulty * 0.15),
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    golden: isGolden || false,
    caught: false
  });
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r: 2 + Math.random() * 4,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      color: color
    });
  }
}

function addFloatingText(x, y, text, color = '#ffcc00', size = 22) {
  floatingTexts.push({
    x, y, text, color, size,
    vy: -2,
    life: 1,
    decay: 0.02
  });
}

function catchSlipper(s) {
  s.caught = true;
  combo++;
  caught++;
  if (combo > maxCombo) maxCombo = combo;

  const multiplier = Math.min(combo, 5);
  const points = s.type.points * multiplier;
  score += points;

  foxHappy = 20;
  foxSad = 0;

  // Effects
  const color = s.golden ? '#ffcc00' : '#ff8833';
  spawnParticles(s.x, s.y, color, s.golden ? 20 : 12);
  addFloatingText(s.x, s.y - 20, `+${points}`, color, s.golden ? 28 : 22);

  if (combo >= 2) {
    comboText.textContent = `x${multiplier}`;
    comboBox.style.opacity = '1';
    comboEl.textContent = `🔥 COMBO x${multiplier}!`;
    comboEl.classList.add('show');
    setTimeout(() => { comboEl.classList.remove('show'); }, 800);
  }

  scoreDisplay.textContent = score;
  scoreDisplay.style.transform = 'scale(1.3)';
  setTimeout(() => { scoreDisplay.style.transform = 'scale(1)'; }, 150);
}

function missSlipper(s) {
  missed++;
  combo = 0;
  comboBox.style.opacity = '0';
  foxSad = 30;
  foxHappy = 0;

  spawnParticles(s.x, s.y, '#6688cc', 8);
  addFloatingText(s.x, s.y - 20, '😢', '#6688cc', 24);

  updateHearts();

  if (missed >= MAX_MISSES) {
    endGame();
  }
}

function updateSlippers() {
  slippers.forEach(s => {
    s.y += s.speed;
    s.rotation += s.rotSpeed;

    // Check catch
    if (!s.caught && s.y > foxY - 30 && s.y < foxY + 20) {
      if (Math.abs(s.x - foxX) < foxWidth * 0.55) {
        catchSlipper(s);
      }
    }

    // Check miss
    if (!s.caught && s.y > H + 20) {
      missSlipper(s);
    }
  });

  slippers = slippers.filter(s => !s.caught && s.y <= H + 20);
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
}

function updateFloatingTexts() {
  floatingTexts.forEach(ft => {
    ft.y += ft.vy;
    ft.life -= ft.decay;
  });
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);
}

function updateFox() {
  // Smooth movement
  const dx = foxTargetX - foxX;
  foxX += dx * 0.15;

  // Clamp
  foxX = Math.max(foxWidth * 0.5, Math.min(W - foxWidth * 0.5, foxX));

  if (foxHappy > 0) foxHappy--;
  if (foxSad > 0) foxSad--;
}

// ============ GAME LOOP ============
function gameLoop(timestamp) {
  if (!gameRunning) return;

  gameTime = timestamp;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0f0520');
  bgGrad.addColorStop(0.5, '#1a0a3e');
  bgGrad.addColorStop(1, '#2a1050');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawGround();

  // Spawn
  if (timestamp - lastSpawn > spawnInterval) {
    spawnSlipper();
    lastSpawn = timestamp;
    // Increase difficulty
    difficulty = 1 + Math.floor(caught / 10) * 0.3;
    spawnInterval = Math.max(500, 1400 - caught * 20);
  }

  updateSlippers();
  updateParticles();
  updateFloatingTexts();
  updateFox();

  // Draw
  slippers.forEach(drawSlipper);
  drawFox(foxX, foxY);
  drawParticles();
  drawFloatingTexts();

  animFrame++;
  requestAnimationFrame(gameLoop);
}

// ============ GAME CONTROL ============
function startGame() {
  score = 0;
  combo = 0;
  maxCombo = 0;
  caught = 0;
  missed = 0;
  difficulty = 1;
  spawnInterval = 1400;
  lastSpawn = 0;
  gameTime = 0;
  slippers = [];
  particles = [];
  floatingTexts = [];
  foxX = W / 2;
  foxTargetX = foxX;
  foxHappy = 0;
  foxSad = 0;

  scoreDisplay.textContent = '0';
  updateHearts();

  hud.classList.remove('hidden');
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  comboBox.style.opacity = '0';

  gameRunning = true;
  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;

  hud.classList.add('hidden');
  comboBox.style.opacity = '0';

  // Show game over
  document.getElementById('finalScore').textContent = score;
  document.getElementById('statCaught').textContent = caught;
  document.getElementById('statMissed').textContent = missed;
  document.getElementById('statMaxCombo').textContent = maxCombo;

  if (score >= 50) {
    document.getElementById('goEmoji').textContent = '🦊🎉';
    document.getElementById('goTitle').textContent = 'Отлично!';
  } else if (score >= 20) {
    document.getElementById('goEmoji').textContent = '🦊😊';
    document.getElementById('goTitle').textContent = 'Хорошо!';
  } else {
    document.getElementById('goEmoji').textContent = '🦊😢';
    document.getElementById('goTitle').textContent = 'Игра окончена!';
  }

  gameOverScreen.classList.remove('hidden');
}

function restartGame() {
  gameOverScreen.classList.add('hidden');
  // Small delay for visual feedback
  setTimeout(() => startGame(), 100);
}

// ============ CONTROLS ============
// Keyboard
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
    foxTargetX = foxX - 40;
  } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
    foxTargetX = foxX + 40;
  }
});

// Touch
let touchStartX = 0;
let touchFoxX = 0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameRunning) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  touchStartX = touch.clientX - rect.left;
  touchFoxX = foxX;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!gameRunning) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const currentX = touch.clientX - rect.left;
  foxTargetX = touchFoxX + (currentX - touchStartX);
}, { passive: false });

// Mouse (for desktop click/drag)
let mouseDown = false;
let mouseStartX = 0;
let mouseFoxX = 0;

canvas.addEventListener('mousedown', e => {
  if (!gameRunning) return;
  mouseDown = true;
  const rect = canvas.getBoundingClientRect();
  mouseStartX = e.clientX - rect.left;
  mouseFoxX = foxX;
});

canvas.addEventListener('mousemove', e => {
  if (!gameRunning || !mouseDown) return;
  const rect = canvas.getBoundingClientRect();
  const currentX = e.clientX - rect.left;
  foxTargetX = mouseFoxX + (currentX - mouseStartX);
});

canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('mouseleave', () => { mouseDown = false; });

// ============ SHARE ============
btnShare.addEventListener('click', () => {
  const text = `🦊 Фенёк Вейв набрал ${score} очков и поймал ${caught} туфелек! 👟🔥 Сыграй и ты!`;

  if (navigator.share) {
    navigator.share({
      title: 'Фенёк Вейв — Охота за туфельками',
      text: text,
      url: window.location.href
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text + ' ' + window.location.href);
  }
});

function fallbackCopy(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('📋 Скопировано в буфер обмена!');
    }).catch(() => {
      showToast('Не удалось скопировать 😢');
    });
  } else {
    // Old school fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 Скопировано!');
  }
}

// ============ BUTTONS ============
btnPlay.addEventListener('click', startGame);
btnRestart.addEventListener('click', restartGame);

// ============ INIT ============
window.addEventListener('resize', resize);
resize();

// Draw initial background
function drawIdle() {
  if (gameRunning) return;
  ctx.clearRect(0, 0, W, H);
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0f0520');
  bgGrad.addColorStop(0.5, '#1a0a3e');
  bgGrad.addColorStop(1, '#2a1050');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  drawStars();
  drawFox(W / 2, H - 80);
  animFrame++;
  requestAnimationFrame(drawIdle);
}

drawIdle();
</script>
